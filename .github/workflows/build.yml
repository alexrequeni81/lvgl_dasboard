name: Build Dashboard Linux i686

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Cross-Compile to Linux i686 (musl-static)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make build-essential tar curl

      - name: Run compilation script
        run: |
          chmod +x build_cross.sh
          ./build_cross.sh

      - name: Upload compiled binary
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_app
          path: build_linux/dashboard_app
          if-no-files-found: error
