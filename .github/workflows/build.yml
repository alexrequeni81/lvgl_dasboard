name: Build Dashboard Linux i686

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  build-linux:
    name: Cross-Compile to Linux i686 (direct gcc)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (including LVGL submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross-compilation tools from apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-i686-linux-gnu \
            libc6-dev-i386-cross

      - name: Cross-compile
        run: bash build_cross.sh

      - name: Upload compiled binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard_app-linux-i686
          path: build_linux/dashboard_app
          if-no-files-found: error
